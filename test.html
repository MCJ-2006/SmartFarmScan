<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm Rover Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  :root {
    --green: #256d29;
    --green-light: #4caf50;
    --green-soft: #6fbf73;
    --green-bg: #eaf6eb;
    --orange: #f57c00;
    --red: #e53935;
    --danger: #ff5252;
    --blue: #1e88e5;
    --bg: #f4f7f5;
    --card-bg: #ffffff;
    --text-dark: #14201a;
    --text-muted: #6b7570;
    --border: #eaeeeb;
    --radius: 18px;
    --radius-sm: 14px;
    --shadow: 0 1px 3px rgba(20,32,26,0.06), 0 6px 20px rgba(20,32,26,0.05);
    --shadow-hover: 0 10px 28px rgba(37,109,41,0.16);
    --transition: 0.25s cubic-bezier(.4,0,.2,1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-dark);
    padding-bottom: 40px;
    -webkit-font-smoothing: antialiased;
  }

  /* NAVBAR */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 64px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }
  .nav-title { font-size: 17px; font-weight: 800; color: var(--text-dark); }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    font-size: 20px; width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition);
  }
  .icon-btn:hover { background: var(--green-bg); }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--green) 0%, var(--green-soft) 100%);
    color: #fff; font-weight: 700; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }

  .main-content {
    max-width: 700px;
    margin: 0 auto;
    padding: 84px 16px 40px;
  }

  /* HERO */
  .hero {
    position: relative;
    overflow: hidden;
    background: linear-gradient(155deg, #1f5f24 0%, #2e8b32 55%, #4caf50 100%);
    border-radius: var(--radius);
    padding: 26px 24px;
    color: #fff;
    margin-bottom: 22px;
    box-shadow: 0 12px 30px rgba(30,90,35,0.28);
  }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .hero-label { font-size: 12.5px; opacity: 0.85; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
  .hero-score { font-size: 40px; font-weight: 900; line-height: 1; letter-spacing: -0.02em; }
  .hero-score .pct { font-size: 22px; font-weight: 700; opacity: 0.85; }
  .hero-tag {
    display: inline-block;
    margin-top: 8px;
    font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,0.2);
    padding: 3px 10px; border-radius: 20px;
  }
  .hero-status {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.18);
    padding: 7px 13px; border-radius: 20px;
    font-size: 12.5px; font-weight: 600;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #b6ffb0; }
  .status-dot.online { box-shadow: 0 0 0 3px rgba(182,255,176,0.35); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .hero-meta {
    display: flex; align-items: center; gap: 24px;
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.22);
  }
  .meta-item { display: flex; flex-direction: column; }
  .meta-label { font-size: 11.5px; opacity: 0.8; }
  .meta-value { font-size: 15px; font-weight: 700; }

  .donut-legend {
    display: flex; gap: 20px; justify-content: center;
    margin-top: 18px; font-size: 12px; font-weight: 500; opacity: 0.95;
  }
  .donut-legend b { font-weight: 800; }
  .donut-legend .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .donut-legend .healthy { background: #ffffff; }
  .donut-legend .diseased { background: var(--danger); box-shadow: 0 0 0 3px rgba(255,82,82,0.25); }

  /* ACTION CARDS */
  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 26px;
  }
  .action-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform var(--transition), box-shadow var(--transition);
  }
  .action-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
  .action-card h3 { font-size: 13.5px; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }
  .action-value { font-size: 25px; font-weight: 800; }
  .action-value span { font-size: 13px; font-weight: 500; color: var(--text-muted); }
  .action-subtext { font-size: 13px; color: var(--text-muted); }

  /* SECTIONS */
  .section-block { margin-bottom: 30px; }
  .section-header { margin-bottom: 14px; }
  .section-header h3 { font-size: 16px; font-weight: 700; }

  .empty-state { color: var(--text-muted); font-size: 13px; text-align: center; padding: 20px 0; }

  .back-btn {
    background: none; border: none; color: var(--green); font-weight: 600;
    font-size: 14px; margin-bottom: 16px; cursor: pointer; padding: 8px 0;
  }
  .view-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

  /* ALERTS / LIST ROWS */
  .alert-list { display: flex; flex-direction: column; gap: 10px; }
  .alert-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform var(--transition), box-shadow var(--transition);
    position: relative;
    overflow: hidden;
  }
  .alert-card::before {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px;
  }
  .alert-card.sev-high::before { background: var(--red); }
  .alert-card.sev-medium::before { background: #f9a825; }
  .alert-card.sev-low::before { background: var(--green); }
  .alert-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .alert-info { flex: 1; min-width: 0; }
  .alert-crop { font-size: 14px; font-weight: 700; }
  .alert-disease { font-size: 12.5px; color: var(--text-muted); margin-top: 1px; }
  .alert-time { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .severity-badge {
    font-size: 10.5px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
    white-space: nowrap;
  }
  .severity-high { background: #ffebee; color: var(--red); }
  .severity-medium { background: #fff8e1; color: #f9a825; }
  .severity-low { background: var(--green-bg); color: var(--green); }

  .hidden { display: none !important; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 200;
  }
  .modal-card {
    background: #fff; border-radius: 20px 20px 0 0;
    width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
    padding: 24px; position: relative;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: var(--green-bg); border: none; border-radius: 50%;
    width: 32px; height: 32px; font-size: 14px; cursor: pointer; color: var(--text-dark);
  }
  .detail-thumb { width: 100%; height: 180px; border-radius: 14px; background: var(--green-bg); margin-bottom: 16px; object-fit: cover; }
  .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .detail-row span:first-child { color: var(--text-muted); }
  .detail-row span:last-child { font-weight: 600; }
  .detail-recommendation { background: var(--green-bg); padding: 14px; border-radius: 12px; margin-top: 16px; font-size: 13.5px; color: var(--green); }

  @media (min-width: 600px) {
    .modal-overlay { align-items: center; }
    .modal-card { border-radius: 20px; }
  }
</style>
</head>
<body>

  <header class="navbar">
    <button class="icon-btn" id="menuBtn">☰</button>
    <h1 class="nav-title">Smart Farm Rover</h1>
    <div class="avatar">FA</div>
  </header>

  <main class="main-content" id="dashboardView">

    <section class="hero">
      <div class="hero-top">
        <div>
          <p class="hero-label">Farm Health Score</p>
          <h2 class="hero-score" id="heroScore">--<span class="pct">%</span></h2>
          <span class="hero-tag" id="heroTag">Loading...</span>
        </div>
        <div class="hero-status"><span class="status-dot online"></span>Rover Online</div>
      </div>

      <div class="hero-meta">
        <div class="meta-item">
          <span class="meta-label">Last Scan</span>
          <span class="meta-value" id="lastScanTime">--</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Scans Today</span>
          <span class="meta-value" id="cropsMonitored">--</span>
        </div>
      </div>

      <div class="donut-legend">
        <span><i class="dot healthy"></i>Healthy — <b id="legendHealthyCount">0</b></span>
        <span><i class="dot diseased"></i>Diseased — <b id="legendDiseasedCount">0</b></span>
      </div>
    </section>

    <section class="card-grid">
      <div class="action-card" id="scansCard">
        <h3>Today's Scans</h3>
        <p class="action-value" id="todaysScansValue">-- <span>Scans</span></p>
      </div>
      <div class="action-card" id="historyCard">
        <h3>History</h3>
        <p class="action-subtext">View all past scan records</p>
      </div>
    </section>

    <section class="section-block">
      <div class="section-header"><h3>Recent Disease Alerts</h3></div>
      <div class="alert-list" id="alertList">
        <p class="empty-state">Loading alerts...</p>
      </div>
    </section>

  </main>

  <!-- DYNAMIC LIST VIEW (Today's Scans / History) -->
  <main class="main-content hidden" id="listView">
    <button class="back-btn" id="backFromList">← Back to Dashboard</button>
    <h2 class="view-title" id="listTitle">Scans</h2>
    <div class="alert-list" id="listContainer"></div>
  </main>

  <!-- SCAN DETAIL MODAL -->
  <div class="modal-overlay hidden" id="detailModal">
    <div class="modal-card">
      <button class="modal-close" id="closeModal">✕</button>
      <div id="detailContent"><p class="empty-state">Loading scan...</p></div>
    </div>
  </div>

<script>
  const API_BASE = "http://127.0.0.1:5000/api/scans";

  // ---------- ELEMENTS ----------
  const dashboardView = document.getElementById("dashboardView");
  const listView = document.getElementById("listView");
  const listTitle = document.getElementById("listTitle");
  const listContainer = document.getElementById("listContainer");
  const detailModal = document.getElementById("detailModal");
  const detailContent = document.getElementById("detailContent");

  // ---------- LOAD DASHBOARD (TODAY'S DATA) ----------
  async function loadDashboard() {
    try {
      const res = await fetch(`${API_BASE}/today`);
      const data = await res.json();
      const scans = data.scans || [];

      const total = scans.length;
      const healthy = scans.filter(s => s.status === "healthy").length;
      const diseased = scans.filter(s => s.status === "diseased").length;
      const healthyPct = total ? Math.round((healthy / total) * 100) : 100;
      const lastScan = scans[0] ? new Date(scans[0].timestamp).toLocaleTimeString() : "No scans yet";

      document.getElementById("heroScore").innerHTML = `${healthyPct}<span class="pct">%</span>`;
      document.getElementById("heroTag").textContent = diseased > 0 ? "Needs Attention" : "Healthy";
      document.getElementById("lastScanTime").textContent = lastScan;
      document.getElementById("cropsMonitored").textContent = total;
      document.getElementById("legendHealthyCount").textContent = healthy;
      document.getElementById("legendDiseasedCount").textContent = diseased;
      document.getElementById("todaysScansValue").innerHTML = `${total} <span>Scans</span>`;

      renderAlerts(scans.filter(s => s.status === "diseased").slice(0, 3));
    } catch (err) {
      console.error("Failed to load dashboard:", err);
      document.getElementById("alertList").innerHTML = `<p class="empty-state">Could not connect to backend. Is Flask running?</p>`;
    }
  }

  // ---------- RENDER ALERT CARDS (clickable) ----------
  function renderAlerts(scans) {
    const list = document.getElementById("alertList");
    if (!scans.length) {
      list.innerHTML = `<p class="empty-state">No disease alerts today.</p>`;
      return;
    }
    list.innerHTML = scans.map(s => `
      <div class="alert-card sev-${s.severity || 'low'}" onclick="openScanDetail(${s.id})">
        <div class="alert-info">
          <p class="alert-crop">${s.crop_type}</p>
          <p class="alert-disease">${s.disease_name || "Unknown"}</p>
          <p class="alert-time">${new Date(s.timestamp).toLocaleString()}</p>
        </div>
        <span class="severity-badge severity-${s.severity || 'low'}">${(s.severity || 'low').toUpperCase()}</span>
      </div>
    `).join("");
  }

  // ---------- DYNAMIC LIST VIEW (Today's Scans OR History) ----------
  async function showList(endpoint, title) {
    listTitle.textContent = title;
    listContainer.innerHTML = `<p class="empty-state">Loading...</p>`;
    dashboardView.classList.add("hidden");
    listView.classList.remove("hidden");

    try {
      const res = await fetch(endpoint);
      const data = await res.json();
      const scans = data.scans || data.history || [];

      if (!scans.length) {
        listContainer.innerHTML = `<p class="empty-state">No records found.</p>`;
        return;
      }

      listContainer.innerHTML = scans.map(s => `
        <div class="alert-card sev-${s.severity || 'low'}" onclick="openScanDetail(${s.id})">
          <div class="alert-info">
            <p class="alert-crop">${s.crop_type} — ${s.status}</p>
            <p class="alert-disease">${s.disease_name || "No disease detected"}</p>
            <p class="alert-time">${new Date(s.timestamp).toLocaleString()}</p>
          </div>
          <span class="severity-badge severity-${s.severity || 'low'}">${(s.severity || 'low').toUpperCase()}</span>
        </div>
      `).join("");
    } catch (err) {
      listContainer.innerHTML = `<p class="empty-state">Failed to load. Check backend connection.</p>`;
    }
  }

  // ---------- SCAN DETAIL MODAL ----------
  async function openScanDetail(scanId) {
    detailContent.innerHTML = `<p class="empty-state">Loading scan detail...</p>`;
    detailModal.classList.remove("hidden");

    try {
      const res = await fetch(`${API_BASE}/${scanId}`);
      const data = await res.json();
      const s = data.scan;

      detailContent.innerHTML = `
        ${s.image_url ? `<img src="${s.image_url}" class="detail-thumb" alt="${s.crop_type}">` : ""}
        <h2>${s.crop_type}</h2>
        <div class="detail-row"><span>Status</span><span>${s.status}</span></div>
        <div class="detail-row"><span>Disease</span><span>${s.disease_name || "None"}</span></div>
        <div class="detail-row"><span>Severity</span><span>${s.severity || "—"}</span></div>
        <div class="detail-row"><span>Confidence</span><span>${s.confidence}%</span></div>
        <div class="detail-row"><span>Temperature</span><span>${s.temperature ?? "—"}°C</span></div>
        <div class="detail-row"><span>Humidity</span><span>${s.humidity ?? "—"}%</span></div>
        <div class="detail-row"><span>Soil Moisture</span><span>${s.soil_moisture ?? "—"}%</span></div>
        <div class="detail-row"><span>Location</span><span>${s.location || "—"}</span></div>
        <div class="detail-row"><span>Time</span><span>${new Date(s.timestamp).toLocaleString()}</span></div>
        ${s.recommendation ? `<div class="detail-recommendation">💡 ${s.recommendation}</div>` : ""}
      `;
    } catch (err) {
      detailContent.innerHTML = `<p class="empty-state">Could not load scan detail.</p>`;
    }
  }

  // ---------- EVENT WIRING ----------
  document.getElementById("scansCard").addEventListener("click", () => {
    showList(`${API_BASE}/today`, "Today's Scans");
  });

  document.getElementById("historyCard").addEventListener("click", () => {
    showList(`${API_BASE}/history`, "Scan History");
  });

  document.getElementById("backFromList").addEventListener("click", () => {
    listView.classList.add("hidden");
    dashboardView.classList.remove("hidden");
  });

  document.getElementById("closeModal").addEventListener("click", () => {
    detailModal.classList.add("hidden");
  });

  detailModal.addEventListener("click", (e) => {
    if (e.target === detailModal) detailModal.classList.add("hidden");
  });

  // ---------- INIT ----------
  document.addEventListener("DOMContentLoaded", loadDashboard);
</script>

</body>
</html>
