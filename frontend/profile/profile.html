<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Smart Farm Rover</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #256d29; --green-light: #4caf50; --green-bg: #eaf6eb;
    --red: #e53935; --bg: #f4f7f5; --card-bg: #ffffff;
    --text-dark: #14201a; --text-muted: #6b7570; --border: #eaeeeb;
    --radius: 18px; --radius-sm: 14px;
    --shadow: 0 1px 3px rgba(20,32,26,0.06), 0 6px 20px rgba(20,32,26,0.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-dark); padding-bottom: 90px; }

  .navbar {
    position: fixed; top: 0; left: 0; right: 0; height: 64px;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; border-bottom: 1px solid var(--border); z-index: 100;
  }
  .back-link { text-decoration: none; color: var(--text-dark); font-size: 20px; }
  .nav-title { font-size: 16px; font-weight: 800; }

  .main-content { max-width: 500px; margin: 0 auto; padding: 84px 16px 40px; }

  .profile-hero {
    background: linear-gradient(155deg, #1f5f24 0%, #2e8b32 55%, #4caf50 100%);
    border-radius: var(--radius); padding: 28px 24px; color: #fff;
    text-align: center; margin-bottom: 20px;
  }
  .profile-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 800; margin: 0 auto 12px;
  }
  .profile-name { font-size: 19px; font-weight: 800; }
  .profile-farm { font-size: 13px; opacity: 0.85; margin-top: 2px; }

  .card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .data-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .data-row:last-child { border-bottom: none; }
  .data-row span:first-child { color: var(--text-muted); }
  .data-row span:last-child { font-weight: 600; }

  .logout-btn {
    width: 100%; background: #ffebee; color: var(--red); border: none;
    padding: 14px; border-radius: 12px; font-weight: 700; font-size: 14px;
    cursor: pointer; margin-top: 6px;
  }
  .logout-btn:hover { background: #ffd6d6; }

  .loading-state { text-align: center; padding: 60px 0; color: var(--text-muted); font-size: 13px; }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
    display: flex; justify-content: space-around; align-items: center;
    border-top: 1px solid var(--border); z-index: 100;
  }
  .bnav-item {
    background: none; border: none; cursor: pointer; text-decoration: none;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--text-muted); font-size: 10.5px; font-weight: 600;
    padding: 8px 16px; border-radius: 14px;
  }
  .bnav-item.active { color: var(--green); background: var(--green-bg); }
</style>
</head>
<body>

  <header class="navbar">
    <a href="../dashboard/dashboard.html" class="back-link">←</a>
    <h1 class="nav-title">Profile</h1>
    <span></span>
  </header>

  <main class="main-content" id="profileContent">
    <p class="loading-state">Loading profile...</p>
  </main>

  <nav class="bottom-nav">
    <a href="../dashboard/dashboard.html" class="bnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="../scan_page/today_scan.html" class="bnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="4" y1="12" x2="20" y2="12"/></svg>
      <span>Scans</span>
    </a>
    <a href="../scan_page/history_scan.html" class="bnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>History</span>
    </a>
    <a href="profile.html" class="bnav-item active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      <span>Profile</span>
    </a>
  </nav>

<script>
  const API_BASE = "https://smartfarmscan-production.up.railway.app/api/auth";

  async function loadProfile() {
    const content = document.getElementById("profileContent");
    try {
      const res = await fetch(`${API_BASE}/me`, { credentials: "include" });
      const data = await res.json();

      if (!res.ok) {
        window.location.href = "../auth/login.html";
        return;
      }

      const f = data.farmer;
      const initials = f.username.slice(0, 2).toUpperCase();

      content.innerHTML = `
        <div class="profile-hero">
          <div class="profile-avatar">${initials}</div>
          <p class="profile-name">${f.username}</p>
          <p class="profile-farm">${f.farm_name || "No farm name set"}</p>
        </div>

        <div class="card">
          <div class="data-row"><span>Email</span><span>${f.email}</span></div>
          <div class="data-row"><span>Farm Name</span><span>${f.farm_name || "—"}</span></div>
          <div class="data-row"><span>Member Since</span><span>${new Date(f.created_at + "Z").toLocaleDateString()}</span></div>
        </div>

        <button class="logout-btn" id="logoutBtn">Log Out</button>
      `;

      document.getElementById("logoutBtn").addEventListener("click", logout);

    } catch (err) {
      content.innerHTML = `<p class="loading-state">Could not connect to backend. Is Flask running?</p>`;
    }
  }

  async function logout() {
    try {
      await fetch(`${API_BASE}/logout`, { method: "POST", credentials: "include" });
    } catch (err) {}
    window.location.href = "../auth/login.html";
  }

  document.addEventListener("DOMContentLoaded", loadProfile);
</script>

</body>
</html>
