<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan History — Smart Farm Rover</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #256d29; --green-light: #4caf50; --green-bg: #eaf6eb;
    --orange: #f57c00; --red: #e53935; --red-bg: #ffebee; --blue: #1e88e5;
    --bg: #f4f7f5; --card-bg: #ffffff; --text-dark: #14201a; --text-muted: #6b7570;
    --border: #eaeeeb; --radius: 18px; --radius-sm: 14px;
    --shadow: 0 1px 3px rgba(20,32,26,0.06), 0 6px 20px rgba(20,32,26,0.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-dark); padding-bottom: 40px; }

  .navbar {
    position: fixed; top: 0; left: 0; right: 0; height: 64px;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; border-bottom: 1px solid var(--border); z-index: 100;
  }
  .back-link { text-decoration: none; color: var(--text-dark); font-size: 20px; }
  .nav-title { font-size: 16px; font-weight: 800; }

  .main-content { max-width: 700px; margin: 0 auto; padding: 84px 16px 40px; }

  .page-header { margin-bottom: 16px; }
  .page-header h2 { font-size: 20px; font-weight: 800; }
  .page-header p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  /* SEARCH BAR */
  .search-bar {
    display: flex; align-items: center; gap: 10px;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 16px; margin-bottom: 18px;
    box-shadow: var(--shadow);
  }
  .search-bar svg { color: var(--text-muted); flex-shrink: 0; }
  .search-bar input {
    border: none; outline: none; flex: 1;
    font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text-dark);
    background: transparent;
  }
  .search-bar input::placeholder { color: var(--text-muted); }
  .clear-btn {
    background: var(--border); border: none; border-radius: 50%;
    width: 20px; height: 20px; font-size: 11px; cursor: pointer;
    display: none; align-items: center; justify-content: center; color: var(--text-muted);
  }
  .clear-btn.show { display: flex; }
  .search-hint { font-size: 11.5px; color: var(--text-muted); margin: -10px 0 18px 4px; }

  /* DAY CARD — redesigned, no file/download feel */
  .day-list { display: flex; flex-direction: column; gap: 12px; }
  .day-card {
    background: var(--card-bg); border-radius: var(--radius-sm);
    padding: 18px; box-shadow: var(--shadow); cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border-top: 3px solid var(--green-light);
  }
  .day-card.has-disease { border-top-color: var(--red); }
  .day-card:hover { transform: translateY(-3px); box-shadow: 0 12px 26px rgba(0,0,0,0.1); }

  .day-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .day-title { font-size: 15px; font-weight: 800; }
  .day-count-badge {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    background: #f0f2f0; padding: 4px 10px; border-radius: 20px;
  }

  .day-stats { display: flex; gap: 20px; margin-bottom: 12px; }
  .stat-block { display: flex; flex-direction: column; }
  .stat-block .num { font-size: 20px; font-weight: 800; }
  .stat-block.healthy .num { color: var(--green); }
  .stat-block.diseased .num { color: var(--red); }
  .stat-block .lbl { font-size: 11px; color: var(--text-muted); }

  .crop-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .crop-tag { font-size: 10.5px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: var(--green-bg); color: var(--green); }

  .empty-state { text-align: center; color: var(--text-muted); font-size: 13px; padding: 40px 0; }
  .loading-state { text-align: center; color: var(--text-muted); font-size: 13px; padding: 40px 0; }
</style>
</head>
<body>

  <header class="navbar">
    <a href="../dashboard/dashboard.html" class="back-link">←</a>
    <h1 class="nav-title">Scan History</h1>
    <span></span>
  </header>

  <main class="main-content">

    <div class="page-header">
      <h2 id="dayCount">Loading...</h2>
      <p>Tap a day to view its scans</p>
    </div>

    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="historySearch" placeholder="Search by date, month, year, or crop">
      <button class="clear-btn" id="clearSearch">✕</button>
    </div>
    <p class="search-hint">e.g. "July", "2026", "July 9", or "Maize"</p>

    <div class="day-list" id="dayList">
      <p class="loading-state">Loading history...</p>
    </div>

  </main>

<script>
  const API_BASE = "https://smartfarmscan-production.up.railway.app/api/scans";
  let groupedDays = [];

  // ---------- FETCH REAL HISTORY FROM BACKEND ----------
  async function loadHistory() {
    try {
      const res = await fetch(`${API_BASE}/history`);
      const data = await res.json();
      const scans = data.history || [];
      groupedDays = groupByDay(scans);
      renderHistory();
    } catch (err) {
      document.getElementById("dayList").innerHTML =
        `<p class="empty-state">Could not connect to backend. Is Flask running?</p>`;
      document.getElementById("dayCount").textContent = "0 Days Recorded";
    }
  }

  // ---------- GROUP FLAT SCAN LIST INTO DAYS ----------
  function groupByDay(scans) {
    const groups = {};
    scans.forEach(s => {
      const dateKey = new Date(s.timestamp + "Z").toISOString().slice(0, 10); // "2026-07-10"
      if (!groups[dateKey]) groups[dateKey] = { date: dateKey, scans: [] };
      groups[dateKey].scans.push(s);
    });

    return Object.values(groups)
      .map(g => {
        const total = g.scans.length;
        const healthy = g.scans.filter(s => s.status === "healthy").length;
        const diseased = total - healthy;
        const crops = [...new Set(g.scans.map(s => s.crop_type))];
        const label = new Date(g.date).toLocaleDateString(undefined, { month: "long", day: "numeric", year: "numeric" });
        return { date: g.date, label, total, healthy, diseased, crops };
      })
      .sort((a, b) => new Date(b.date) - new Date(a.date));
  }

  // ---------- RENDER ----------
  function renderHistory(query = "") {
    const list = document.getElementById("dayList");
    const q = query.trim().toLowerCase();

    const filtered = !q
      ? groupedDays
      : groupedDays.filter(day =>
          day.label.toLowerCase().includes(q) ||
          day.date.toLowerCase().includes(q) ||
          day.crops.some(c => c.toLowerCase().includes(q))
        );

    document.getElementById("dayCount").textContent = `${groupedDays.length} Day${groupedDays.length !== 1 ? "s" : ""} Recorded`;

    if (!filtered.length) {
      list.innerHTML = query
        ? `<p class="empty-state">No records found for "${query}".</p>`
        : `<p class="empty-state">No scan history yet.</p>`;
      return;
    }

    list.innerHTML = filtered.map(day => `
      <div class="day-card ${day.diseased > 0 ? 'has-disease' : ''}" onclick="goToDay('${day.date}')">
        <div class="day-header">
          <p class="day-title">${day.label}</p>
          <span class="day-count-badge">${day.total} scans</span>
        </div>
        <div class="day-stats">
          <div class="stat-block healthy">
            <span class="num">${day.healthy}</span>
            <span class="lbl">Healthy</span>
          </div>
          <div class="stat-block diseased">
            <span class="num">${day.diseased}</span>
            <span class="lbl">Diseased</span>
          </div>
        </div>
        <div class="crop-tags">
          ${day.crops.map(c => `<span class="crop-tag">${c}</span>`).join("")}
        </div>
      </div>
    `).join("");
  }

  function goToDay(date) {
    window.location.href = `today_scan.html?date=${date}`;
  }

  // ---------- SEARCH ----------
  const searchInput = document.getElementById("historySearch");
  const clearBtn = document.getElementById("clearSearch");

  searchInput.addEventListener("input", (e) => {
    clearBtn.classList.toggle("show", e.target.value.length > 0);
    renderHistory(e.target.value);
  });
  clearBtn.addEventListener("click", () => {
    searchInput.value = "";
    clearBtn.classList.remove("show");
    renderHistory();
  });

  document.addEventListener("DOMContentLoaded", loadHistory);
</script>

</body>
</html>
