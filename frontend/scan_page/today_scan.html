<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today's Scans — Smart Farm Rover</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #256d29; --green-light: #4caf50; --green-bg: #eaf6eb;
    --red: #e53935; --red-bg: #ffebee;
    --bg: #f4f7f5; --card-bg: #ffffff; --text-dark: #14201a; --text-muted: #6b7570;
    --border: #eaeeeb; --radius-sm: 14px;
    --shadow: 0 1px 3px rgba(20,32,26,0.06), 0 6px 20px rgba(20,32,26,0.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-dark); padding-bottom: 90px; }

  .navbar {
    position: fixed; top: 0; left: 0; right: 0; height: 64px;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; border-bottom: 1px solid var(--border); z-index: 100;
  }
  .back-link { text-decoration: none; color: var(--text-dark); font-size: 20px; }
  .nav-title { font-size: 16px; font-weight: 800; }

  .main-content { max-width: 700px; margin: 0 auto; padding: 84px 16px 40px; }

  .page-header { margin-bottom: 16px; }
  .page-header h2 { font-size: 20px; font-weight: 800; }
  .page-header p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  .search-bar {
    display: flex; align-items: center; gap: 10px;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 16px; margin-bottom: 18px;
    box-shadow: var(--shadow);
  }
  .search-bar svg { color: var(--text-muted); flex-shrink: 0; }
  .search-bar input {
    border: none; outline: none; flex: 1;
    font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text-dark);
    background: transparent;
  }
  .clear-btn {
    background: var(--border); border: none; border-radius: 50%;
    width: 20px; height: 20px; font-size: 11px; cursor: pointer;
    display: none; align-items: center; justify-content: center; color: var(--text-muted);
  }
  .clear-btn.show { display: flex; }

  /* SCAN CARD */
  .scan-list { display: flex; flex-direction: column; gap: 10px; }
  .scan-card {
    background: var(--card-bg); border-radius: var(--radius-sm);
    padding: 14px; display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow); cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border-left: 5px solid transparent;
  }
  .scan-card.healthy { border-left-color: var(--green); }
  .scan-card.diseased { border-left-color: var(--red); }
  .scan-card:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0,0,0,0.1); }

  /* HEALTH RING — this is the main percentage the farmer sees first */
  .health-ring {
    width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: #fff;
  }
  .health-ring.healthy { background: var(--green-light); }
  .health-ring.diseased { background: var(--red); }

  .scan-info { flex: 1; min-width: 0; }
  .scan-crop { font-size: 14px; font-weight: 700; }

  /* CONFIDENCE LINE — separate from health %, its own color */
  .confidence-text { font-size: 11.5px; font-weight: 600; margin-top: 2px; }
  .confidence-text.healthy { color: var(--green); }
  .confidence-text.diseased { color: var(--red); }

  .scan-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .empty-state { text-align: center; color: var(--text-muted); font-size: 13px; padding: 40px 0; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
    display: flex; justify-content: space-around; align-items: center;
    border-top: 1px solid var(--border); z-index: 100;
  }
  .bnav-item {
    background: none; border: none; cursor: pointer; text-decoration: none;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--text-muted); font-size: 10.5px; font-weight: 600;
    padding: 8px 16px; border-radius: 14px;
  }
  .bnav-item.active { color: var(--green); background: var(--green-bg); }
</style>
</head>
<body>

  <header class="navbar">
    <a href="../dashboard/dashboard.html" class="back-link">←</a>
    <h1 class="nav-title">Today's Scans</h1>
    <span></span>
  </header>

  <main class="main-content">

    <div class="page-header">
      <h2 id="scanCount">Loading...</h2>
      <p>Tap a scan to view full details</p>
    </div>

    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="timeSearch" placeholder="Search by time e.g. 8:00 AM">
      <button class="clear-btn" id="clearSearch">✕</button>
    </div>

    <div class="scan-list" id="scanList">
      <p class="empty-state">Loading scans...</p>
    </div>

  </main>

  <nav class="bottom-nav">
    <a href="../dashboard/dashboard.html" class="bnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="today_scan.html" class="bnav-item active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="4" y1="12" x2="20" y2="12"/></svg>
      <span>Scans</span>
    </a>
    <a href="history_scan.html" class="bnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>History</span>
    </a>
    <a href="profile.html" class="bnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      <span>Profile</span>
    </a>
  </nav>

<script>
  const API_BASE = "http://127.0.0.1:5000/api/scans";
  let allScans = [];

  async function loadTodayScans() {
    try {
      const res = await fetch(`${API_BASE}/today`);
      const data = await res.json();
      allScans = data.scans || [];
      renderScans();
    } catch (err) {
      document.getElementById("scanList").innerHTML =
        `<p class="empty-state">Could not connect to backend. Is Flask running?</p>`;
      document.getElementById("scanCount").textContent = "0 Scans Today";
    }
  }

  // Health % = how healthy the crop is. Healthy scan → high number. Diseased → low number.
  function getHealthPercent(s) {
    return s.status === "healthy" ? Math.round(s.confidence) : Math.round(100 - s.confidence);
  }

  function renderScans(query = "") {
    const list = document.getElementById("scanList");
    const q = query.trim().toLowerCase();

    const filtered = q
      ? allScans.filter(s => new Date(s.timestamp + "Z").toLocaleTimeString().toLowerCase().includes(q))
      : allScans;

    document.getElementById("scanCount").textContent = `${allScans.length} Scans Today`;

    if (!filtered.length) {
      list.innerHTML = query
        ? `<p class="empty-state">No scans found for "${query}".</p>`
        : `<p class="empty-state">No scans recorded today yet.</p>`;
      return;
    }

    list.innerHTML = filtered.map(s => {
      const state = s.status === "healthy" ? "healthy" : "diseased";
      const healthPct = getHealthPercent(s);
      const timeStr = new Date(s.timestamp + "Z").toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      return `
        <div class="scan-card ${state}" onclick="goToDetail(${s.id})">
          <div class="health-ring ${state}">${healthPct}%</div>
          <div class="scan-info">
            <p class="scan-crop">${s.crop_type} — ${s.disease_name || "No disease detected"}</p>
            <p class="confidence-text ${state}">AI Confidence: ${Math.round(s.confidence)}%</p>
            <p class="scan-time">${timeStr}</p>
          </div>
        </div>
      `;
    }).join("");
  }

  function goToDetail(id) {
    window.location.href = `scan_detail.html?id=${id}`;
  }

  const searchInput = document.getElementById("timeSearch");
  const clearBtn = document.getElementById("clearSearch");

  searchInput.addEventListener("input", (e) => {
    const value = e.target.value;
    clearBtn.classList.toggle("show", value.length > 0);
    renderScans(value);
  });

  clearBtn.addEventListener("click", () => {
    searchInput.value = "";
    clearBtn.classList.remove("show");
    renderScans();
  });

  document.addEventListener("DOMContentLoaded", loadTodayScans);
</script>

</body>
</html>
